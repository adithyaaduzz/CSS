<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT CARD</title>
</head>
    <style>
        body{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            overflow: auto;

        }
        h2{
            position: fixed;
            top: 0;
            left: 0;
            width:100%;
            background-color:darkcyan;
            text-align: center;
            padding: 15px;
            font-size: 20px;
        }
        .employee{
            text-align: center;
    margin-right: 240px;
}
        
        .employee h3{
            font-family:'Times New Roman', Times, serif;
            font-size: large;
            color:rebeccapurple;
        }
        .employee h4{
            font-family:'Times New Roman', Times, serif;
            color:royalblue;
            font-size: medium;
        }
        .profile{
            margin-top: 70px;
            position: relative;
            background-color: aliceblue;
            border: 1px solid cornsilk;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
            overflow: auto;
            box-sizing: border-box;
        }
        .profile-img{
    float: left;
    width: 150px;
    height: 150px;
    margin-right: 20px;
    border-radius: 10px;
    object-fit: cover;
}
        .employee p{
            margin-top: 10px;
            color:brown;
        }
        .contact{
            width: 200px;
            text-align: center;
            background: bisque;
             padding: 20px;
             box-sizing: border-box;
             top:20px;
             right: 20px;
             border-left: 2px solid chocolate;
             position: absolute;

        }
        .contact h3
        {
    margin-top: 0;
    color: rgb(5,58,58);
}
        
        .contact p
        {
           margin: 5px 0;
           color: rgb(9, 21, 17);
        }
        .clear{
            clear:both;
        }

    </style>
    <body>
        <h2>CONTACT CARD</h2>
        <div class="profile">
    <img src="profile.jpg" class="profile-img" alt="Employee Photo">

    <div class="employee">
        <h3>Smitha S</h3>
        <h4>Software Engineer</h4>
        <p>
            Smitha is a dedicated Software Engineer with 5 years of experience
            in web development. She enjoys building modern and user-friendly
            applications.
        </p>
    </div>

    <div class="contact">
        <h3>Contact Info</h3>
        <p><a href="tel:+919567890123">+91 95678 90123</a></p>
        <p><a href="mailto:Smith345@gmail.com">Smith345@gmail.com</a></p>
    </div>

    <div class="clear"></div>
</div>
</body>
</html>
